worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100m;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;

        # Docker embedded DNS — required for regex locations to resolve container names
        resolver 127.0.0.11 valid=30s ipv6=off;
        resolver_timeout 5s;

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Proxy /api/* → scorestream-api:5000
        location ~ ^/api/(.*)$ {
            set $api_upstream http://scorestream-api:5000;
            proxy_pass         $api_upstream/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_request_buffering off;
        }

        # HLS .m3u8 playlists — proxy to stream manager (triggers touchStream/stream start)
        location ~ ^/hls/[^/]+\.m3u8$ {
            set $stream_upstream http://scorestream-stream:3001;
            proxy_pass         $stream_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            add_header         Cache-Control no-cache;
            add_header         Access-Control-Allow-Origin *;
        }

        # HLS .ts segments — proxy to stream manager (resets idle timer)
        location ~ ^/hls/[^/]+\.ts$ {
            set $stream_upstream http://scorestream-stream:3001;
            proxy_pass         $stream_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            add_header         Cache-Control no-cache;
            add_header         Access-Control-Allow-Origin *;
            proxy_buffering    off;
        }

        # Stream manager status endpoint
        location = /stream/status {
            proxy_pass         http://scorestream-stream:3001/status;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            add_header         Access-Control-Allow-Origin *;
        }

        location / {
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
