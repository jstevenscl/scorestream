services:

  scorestream-api:
    image: ghcr.io/${GITHUB_OWNER:-jstevenscl}/scorestream-api:${SCORESTREAM_TAG:-beta}
    container_name: scorestream-api
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/New_York}
      - STREAM_BASE_URL=${STREAM_BASE_URL}
      - STREAM_MANAGER_URL=http://scorestream-stream:3001
      - DISPATCHARR_URL=${DISPATCHARR_URL}
      - DB_PATH=/config/scorestream.db
    volumes:
      - scorestream_config:/config
      - scorestream_audio:/audio_library
    networks:
      - scorestream_net

  scorestream-web:
    image: ghcr.io/${GITHUB_OWNER:-jstevenscl}/scorestream-web:${SCORESTREAM_TAG:-beta}
    container_name: scorestream-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-7777}:80"
    volumes:
      - scorestream_hls:/usr/share/nginx/html/hls:ro
    networks:
      - scorestream_net

  scorestream-stream:
    image: ghcr.io/${GITHUB_OWNER:-jstevenscl}/scorestream-stream:${SCORESTREAM_TAG:-beta}
    container_name: scorestream-stream
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/New_York}
      - STREAM_WIDTH=${STREAM_WIDTH:-1920}
      - STREAM_HEIGHT=${STREAM_HEIGHT:-1080}
      - STREAM_FPS=${STREAM_FPS:-1}
      # Stream quality tier — controls text crispness vs resource usage.
      # Options: low | balanced | high (default: balanced)
      #   low      = original behavior, lowest bandwidth, ~800 kbps
      #   balanced = noticeably crisper text, ~1.5 Mbps, SAME CPU as low
      #   high     = best text quality, ~3 Mbps, ~3x more CPU per frame
      - STREAM_QUALITY=${STREAM_QUALITY:-balanced}
      # Individual encoder overrides (set any of these to override the tier)
      # - STREAM_BITRATE=1500k
      # - STREAM_MAXRATE=2500k
      # - STREAM_BUFSIZE=4000k
      # - STREAM_PRESET=veryfast
      # - JPEG_QUALITY=92
      # Browser supersampling — 2 renders at 2x resolution for crisper text
      # but uses ~4x browser memory. Default 1 = native rendering.
      # - STREAM_DPR=2
      - WEB_BASE=http://scorestream-web
      - DB_PATH=/config/scorestream.db
      - HLS_DIR=/hls
      - PIPES_DIR=/tmp/pipes
      - MANAGER_PORT=3001
      - HLS_SEGMENT_DURATION=${HLS_SEGMENT_DURATION:-2}
      - HLS_PLAYLIST_SIZE=${HLS_PLAYLIST_SIZE:-4}
      - AUDIO_DIR=/audio
      - TICKER_FILE=/ticker/scores.txt
      - TICKER_API_BASE=http://scorestream-api:5000
    volumes:
      - scorestream_config:/config
      - scorestream_hls:/hls
      - scorestream_audio:/audio_library
      - scorestream_ticker:/ticker
    networks:
      - scorestream_net
    shm_size: 512mb

networks:
  scorestream_net:
    name: scorestream_net
    driver: bridge

volumes:
  scorestream_config:
    name: scorestream_config
  scorestream_hls:
    name: scorestream_hls
  scorestream_audio:
    name: scorestream_audio
  scorestream_ticker:
    name: scorestream_ticker
    external: true
